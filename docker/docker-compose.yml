# NOTE (ADR-004): docker-compose.yml lives in docker/ so volume paths relative to
# the project root use ../ prefix. Blueprint §6.1 shows ./data/ which would resolve
# to docker/data/ — corrected to ../data/ to match the §1.1.1 directory layout.
services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: adventureworks
      POSTGRES_USER: aw_user
      POSTGRES_PASSWORD: ${PG_PASSWORD}
    ports: ["5432:5432"]
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ../data/adventureworks/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aw_user -d adventureworks"]
      interval: 10s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5.26-community
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD}
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:7474 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5

  redis:
    image: redis:7.4-alpine
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ../backend
      dockerfile: ../docker/Dockerfile.api
    ports: ["8000:8000"]
    volumes:
      - ../config.yaml:/config.yaml:ro
    environment:
      DATABASE_URL: postgresql+asyncpg://aw_user:${PG_PASSWORD}@postgres:5432/adventureworks
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
      REDIS_URL: redis://redis:6379
      GITHUB_TOKEN: ${GITHUB_TOKEN}
      LANGCHAIN_TRACING_V2: "true"
      LANGCHAIN_API_KEY: ${LANGSMITH_API_KEY}
    depends_on:
      postgres: { condition: service_healthy }
      neo4j: { condition: service_healthy }
      redis: { condition: service_healthy }

  frontend:
    build:
      context: ../frontend
      dockerfile: ../docker/Dockerfile.frontend
    ports: ["3000:3000"]
    depends_on: [api]

volumes:
  pg_data:
  neo4j_data:
