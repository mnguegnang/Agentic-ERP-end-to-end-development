# ==============================================================================
# Agentic ERP Supply Chain Copilot — Non-Secret Configuration
# All secrets (API keys, passwords) go in .env — never here.
# ==============================================================================

app:
  name: "Agentic ERP Supply Chain Copilot"
  version: "0.1.0"
  debug: false

llm:
  provider: "github_models"
  model: "gpt-4o"
  base_url: "https://models.inference.ai.azure.com"
  temperature: 0.0
  max_tokens: 4096

agent:
  intent_confidence_threshold: 0.7     # below this → ask clarification
  human_approval_cost_threshold: 10000.0  # USD — decisions above this trigger HITL gate

rag:
  chunk_size: 512
  chunk_overlap: 50
  embedding_model: "BAAI/bge-large-en-v1.5"
  embedding_prefix: "Represent this document for retrieval: "
  bm25_top_k: 20
  dense_top_k: 20
  rrf_k: 60                            # Reciprocal Rank Fusion smoothing constant
  reranker_model: "cross-encoder/ms-marco-MiniLM-L-12-v2"
  final_top_k: 5

cache:
  ttl_seconds: 3600                    # Redis semantic cache TTL

solvers:
  random_seed: 42
  default_time_limit_sec: 60           # CP-SAT / VRP anytime solver cutoff

observability:
  langsmith_tracing: false             # set true when LANGSMITH_API_KEY is configured
  otel_endpoint: "http://localhost:4317"
